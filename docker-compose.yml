version: '3.8'

services:
  sentinel-omega:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sentinel-omega
    restart: unless-stopped
    
    ports:
      - "8888:8888"
    
    environment:
      - NODE_ENV=production
    
    env_file:
      - .env
    
    volumes:
      - ./briefings:/app/briefings
      - ./logs:/app/logs
    
    networks:
      - sentinel-network
    
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8888/api/status', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  sentinel-network:
    driver: bridge

volumes:
  briefings:
  logs:
